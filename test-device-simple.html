<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Device Simple</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 2rem;
            background: #0F0A1A;
            color: white;
        }
        
        .stat-card {
            background: rgba(30, 25, 45, 0.7);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(91, 76, 245, 0.15);
            max-width: 300px;
        }
        
        .device-switch {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 1rem;
        }
        
        .device-btn {
            background: transparent;
            border: 1px solid rgba(91, 76, 245, 0.15);
            border-radius: 8px;
            padding: 0.45rem 0.6rem;
            cursor: pointer;
            color: #94A3B8;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .device-btn:hover {
            background: rgba(91, 76, 245, 0.1);
        }
        
        .device-btn.active {
            background: #5B4CF5;
            color: white;
            border-color: #5B4CF5;
            box-shadow: 0 2px 8px rgba(91, 76, 245, 0.3);
        }
        
        .device-stats {
            position: relative;
            margin: 1rem 0;
        }
        
        .device-stat {
            display: none;
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(91, 76, 245, 0.1);
        }
        
        .device-stat.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #5B4CF5;
        }
        
        .stat-label {
            font-size: 1rem;
            color: #94A3B8;
            margin-top: 0.5rem;
        }
        
        .debug {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h2>🧪 Test Botones Dispositivos</h2>
    <p>Si esto funciona, el problema está en otro lugar de index.html</p>
    
    <div class="stat-card devices">
        <div class="device-switch">
            <button class="device-btn active" data-device="mobile" onclick="switchDevice('mobile')">
                <i class="fas fa-mobile-alt"></i> Móvil
            </button>
            <button class="device-btn" data-device="desktop" onclick="switchDevice('desktop')">
                <i class="fas fa-desktop"></i> PC
            </button>
            <button class="device-btn" data-device="tablet" onclick="switchDevice('tablet')">
                <i class="fas fa-tablet-alt"></i> Tablet
            </button>
        </div>
        
        <div class="device-stats">
            <div class="device-stat active" data-device="mobile">
                <div class="stat-number">45%</div>
                <div class="stat-label">📱 Usuarios Móviles</div>
            </div>
            <div class="device-stat" data-device="desktop">
                <div class="stat-number">40%</div>
                <div class="stat-label">🖥️ Usuarios Desktop</div>
            </div>
            <div class="device-stat" data-device="tablet">
                <div class="stat-number">15%</div>
                <div class="stat-label">📟 Usuarios Tablet</div>
            </div>
        </div>
    </div>
    
    <div class="debug" id="debug">
        <strong>Debug:</strong><br>
    </div>

    <script>
        function log(msg) {
            console.log(msg);
            document.getElementById('debug').innerHTML += msg + '<br>';
        }
        
        function switchDevice(device) {
            log('🖱️ Click en: ' + device);
            
            // Quitar active de todos
            document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.device-stat').forEach(s => s.classList.remove('active'));
            
            // Agregar active al seleccionado
            document.querySelector(`.device-btn[data-device="${device}"]`).classList.add('active');
            document.querySelector(`.device-stat[data-device="${device}"]`).classList.add('active');
            
            log('✅ Cambiado a: ' + device);
        }
        
        log('✅ Página cargada');
        log('🔍 Botones encontrados: ' + document.querySelectorAll('.device-btn').length);
    </script>
</body>
</html>
